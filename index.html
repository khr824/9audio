<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9th grade: Audio Player</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }
        .player-container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
            width: 320px;
        }
        h2 {
            margin-top: 0;
            color: #333;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 8px;
            margin-bottom: 20px;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover:not(:disabled) {
            background: #0056b3;
        }
        button:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            font-weight: 500;
            color: #555;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
        }
        .volume-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            color: #444;
            font-weight: 500;
        }
        input[type="range"] {
            flex-grow: 1;
            margin-left: 15px;
            cursor: pointer;
        }

        /* Modal Overlay Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .modal-content h3 {
            margin-top: 0;
            color: #333;
        }
        .modal-content ol {
            margin-bottom: 25px;
            color: #444;
            line-height: 1.6;
            padding-left: 20px;
        }
        .modal-content button {
            margin-bottom: 0;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div id="instructionModal" class="modal-overlay">
    <div class="modal-content">
        <h3>Instructions:</h3>
        <ol>
            <li>You WILL NOT be able to pause the audio.</li>
            <li>Click play when you're ready to start.</li>
        </ol>
        <button id="closeModalBtn">I Understand</button>
    </div>
</div>

<div class="player-container">
    <h2>Now Playing</h2>
    
    <audio id="audioPlayer" src="audio2.mp3" preload="metadata"></audio>

    <div class="controls">
        <button id="playBtn">Play</button>
        
        <div class="time-display">
            <span id="currentTime">0:00</span>
            <span id="remainingTime">-0:00</span>
        </div>

        <div class="volume-control">
            <label for="volumeSlider">Volume</label>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
        </div>
    </div>
</div>

<script>
    const audio = document.getElementById('audioPlayer');
    const playBtn = document.getElementById('playBtn');
    const currentTimeEl = document.getElementById('currentTime');
    const remainingTimeEl = document.getElementById('remainingTime');
    const volumeSlider = document.getElementById('volumeSlider');
    
    // Modal Elements
    const instructionModal = document.getElementById('instructionModal');
    const closeModalBtn = document.getElementById('closeModalBtn');

    // Close Modal Logic
    closeModalBtn.addEventListener('click', () => {
        instructionModal.classList.add('hidden');
    });

    // Time Formatter
    function formatTime(seconds) {
        if (isNaN(seconds) || seconds < 0) return "0:00";
        const hrs = Math.floor(seconds / 3600);
        const min = Math.floor((seconds % 3600) / 60);
        const sec = Math.floor(seconds % 60);
        
        const formattedMin = hrs > 0 && min < 10 ? '0' + min : min;
        const formattedSec = sec < 10 ? '0' + sec : sec;
        
        return hrs > 0 
            ? `${hrs}:${formattedMin}:${formattedSec}` 
            : `${formattedMin}:${formattedSec}`;
    }

    // Load LocalStorage Data
    window.addEventListener('load', () => {
        const savedTime = localStorage.getItem('audio2_progress');
        if (savedTime !== null) {
            audio.currentTime = parseFloat(savedTime);
        }
        
        const savedVolume = localStorage.getItem('audio2_volume');
        if (savedVolume !== null) {
            audio.volume = parseFloat(savedVolume);
            volumeSlider.value = savedVolume;
        }
    });

    audio.addEventListener('loadedmetadata', () => {
        currentTimeEl.textContent = formatTime(audio.currentTime);
        remainingTimeEl.textContent = "-" + formatTime(audio.duration - audio.currentTime);
    });

    // Play Only Logic (Pause removed)
    playBtn.addEventListener('click', () => {
        if (audio.paused) {
            audio.play();
            playBtn.textContent = 'Playing...';
            playBtn.disabled = true; // Locks the button so they cannot pause
        }
    });

    // Time Update & Save Progress
    audio.addEventListener('timeupdate', () => {
        currentTimeEl.textContent = formatTime(audio.currentTime);
        
        if (!isNaN(audio.duration)) {
            remainingTimeEl.textContent = "-" + formatTime(audio.duration - audio.currentTime);
        }
        
        localStorage.setItem('audio2_progress', audio.currentTime);
    });

    // Volume Update
    volumeSlider.addEventListener('input', (e) => {
        audio.volume = e.target.value;
        localStorage.setItem('audio2_volume', audio.volume);
    });

    // Reset when finished
    audio.addEventListener('ended', () => {
        playBtn.textContent = 'Play';
        playBtn.disabled = false; // Re-enable for replay
        localStorage.removeItem('audio2_progress');
        currentTimeEl.textContent = "0:00";
        remainingTimeEl.textContent = "-" + formatTime(audio.duration);
    });
</script>

</body>
</html>
